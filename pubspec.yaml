name: task_organizer
description: A sleek task organizer with calendar, deadlines, and notifications.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  table_calendar: ^3.1.0
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.1
  timezone: ^0.9.2
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  home_widget: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  fonts:
    - family: NotoSans
      fonts:
        - asset: fonts/NotoSans-VariableFont_wdth,wght.ttf
        - asset: fonts/NotoSans-Italic-VariableFont_wdth,wght.ttf
          style: italic
    - family: NotoSerif
      fonts:
        - asset: fonts/NotoSerif-VariableFont_wdth,wght.ttf
        - asset: fonts/NotoSerif-Italic-VariableFont_wdth,wght.ttf
          style: italic
  uses-material-design: true
